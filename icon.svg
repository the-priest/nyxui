<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1a2452"/>
      <stop offset="55%" stop-color="#0a0f24"/>
      <stop offset="100%" stop-color="#03050e"/>
    </linearGradient>

    <radialGradient id="moonHalo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#88a4d4" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#88a4d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#88a4d4" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="moonBody" x1="0.1" y1="0.0" x2="0.85" y2="1.0">
      <stop offset="0%"  stop-color="#f4f7ff"/>
      <stop offset="45%" stop-color="#cdd6ec"/>
      <stop offset="100%" stop-color="#7a92be"/>
    </linearGradient>

    <radialGradient id="starGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#bcd0f6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#bcd0f6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Base rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Background starfield -->
  <g fill="#ffffff">
    <circle cx="84"  cy="92"  r="1.6" opacity="0.7"/>
    <circle cx="142" cy="58"  r="1.1" opacity="0.5"/>
    <circle cx="430" cy="118" r="1.4" opacity="0.55"/>
    <circle cx="458" cy="210" r="0.9" opacity="0.4"/>
    <circle cx="78"  cy="220" r="1.0" opacity="0.45"/>
    <circle cx="436" cy="380" r="1.3" opacity="0.5"/>
    <circle cx="118" cy="436" r="1.0" opacity="0.45"/>
    <circle cx="246" cy="462" r="1.1" opacity="0.4"/>
    <circle cx="66"  cy="338" r="0.9" opacity="0.35"/>
    <circle cx="380" cy="466" r="1.0" opacity="0.4"/>
    <circle cx="356" cy="62"  r="1.0" opacity="0.45"/>
    <circle cx="200" cy="98"  r="0.8" opacity="0.35"/>
  </g>

  <!-- Halo behind moon -->
  <circle cx="252" cy="268" r="210" fill="url(#moonHalo)"/>

  <!-- Crescent: outer disc minus offset inner disc using evenodd fill -->
  <path fill="url(#moonBody)" fill-rule="evenodd" d="
    M 252 108
    a 160 160 0 1 0 0 320
    a 160 160 0 1 0 0 -320
    Z
    M 290 130
    a 132 132 0 1 0 0 264
    a 132 132 0 1 0 0 -264
    Z
  "/>

  <!-- Accent star, upper-left -->
  <g transform="translate(132 152)">
    <circle r="36" fill="url(#starGlow)"/>
    <path d="M 0 -24 L 4.5 -4.5 L 24 0 L 4.5 4.5 L 0 24 L -4.5 4.5 L -24 0 L -4.5 -4.5 Z"
          fill="#ffffff"/>
  </g>

  <!-- Tiny sparkle, lower-right for balance -->
  <g transform="translate(420 358)">
    <circle r="14" fill="url(#starGlow)" opacity="0.75"/>
    <path d="M 0 -9 L 1.7 -1.7 L 9 0 L 1.7 1.7 L 0 9 L -1.7 1.7 L -9 0 L -1.7 -1.7 Z"
          fill="#e8eef8"/>
  </g>

  <!-- Rim shading -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="url(#rim)" pointer-events="none"/>
</svg>
